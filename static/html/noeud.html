<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiScrap - Article</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1 id="article-title">Titre de l'article</h1>
        <div class="article-meta">
        </div>
        <div id="retour-edition"></div>
    </header>

    <main>
        <section id="article-content">

            <!-- Dans page.html -->
            <div id="wikipedia-container">
                <h1 id="titre"></h1>
                <div id="scoreNode"></div>
                <div id="scoreArbre"></div>

                <div id="contenu"></div>

                <button id="suivant">Suivant</button>

                <div id="popupOverlay" class="hidden">
                    <div id="popupBox">
                        <div id="popupChoices"></div>
                    </div>
                </div>


            </div>
 
       
        </section>

    </main>
    
    <footer>
        <div id="footer"></div>
    </footer>
    <script type="module" src="../js/noeud.js"></script>
</body>
</html>
