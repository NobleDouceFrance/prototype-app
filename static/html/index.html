<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WikiScrap - Liste des articles</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <header>
            <h1>WikiScrap</h1>
            <p>Consultez les articles Wikipedia scrapés</p>
        </header>

        <main>
            <section id="article-list">
                <h2>Articles disponibles</h2>
                <ul id="articles"></ul>
            </section>
        </main>

        <footer>
            <p>Données scrapées par <span id="garant"></span>. Méthode : <span id="methode"></span></p>
        </footer>
        <script src="../js/script.js"></script>
    </body>
</html>
